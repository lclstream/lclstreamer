source_identifier: "{{ source_identifier }}"
skip_incomplete_events: True

data_sources:
    timestamp:
        type: Psana2Timestamp

    detector_data:
        type: Psana2DetectorInterface
        psana_name: "{{ areadetector_name }}" # jungfrau
        psana_fields: "{{ areadetector_field }}" # Use raw.calib for calibrated data

        #    assembled_detector_data:
        #        type: Psana2DetectorInterface
        #        psana_name: jungfrau
        #        psana_fields: raw.image

    photon_wavelength:
        type: Psana2DetectorInterface
        psana_name: "{{ photon_wavelength_pv }}" # "SIOC:SYS0:ML00:AO192"

    detector_geometry:
        type: Psana2DetectorInterface
        psana_name: "{{ areadetector_name }}" # "jungfrau"
        psana_fields: [
                "_detid", # Detector ID
                "raw._det_geotxt_default", # Geometry data
                #"raw._pixel_coords", # Pixel coords
            ]
        dtype: str

    beam_data: # Optional
        type: Psana2DetectorInterface
        psana_name: "{{ ebeam_detector }}" # ebeamh
        psana_fields: [
                # Photon energy (eV), psana2's undulator-equation conversion of the
                # eBeam L3 energy. Shipped as photon_energy and used as a per-shot
                # wavelength fallback. (Not raw.ebeamL3Energy -- that is the
                # electron-beam energy in MeV, not a photon energy.)
                "raw.ebeamPhotonEnergy", # Photon energy
            ]

    run_info:
        type: Psana2RunInfo

event_source:
    type: Psana2EventSource

processing_pipeline:
    type: BatchProcessingPipeline
    batch_size: {{ batch_size }} # 1

data_serializer:
    type: SimplonBinarySerializer
    data_source_to_serialize: "{{ areadetector_name }}.{{ areadetector_field }}"
    polarization_fraction: {{ polarization_fraction }} # e.g. 0
    polarization_axis: {{ polarization_axis }} # e.g. [1.0, 0.0, 0.0]
    data_collection_rate: "{{ collection_rate }}"  # e.g. "120Hz"
    detector_name: "{{ areadetector_name }}"  # "jungfrau"
    detector_type: "AreaDetector"

data_handlers:
    - type: BinaryDataStreamingDataHandler
      urls:
          - "{{ out_url }}"  # "tcp://sdfdtn002:5001"
      distribute: False
      buffer: 0
      role: client
      library: zmq
      socket_type: push
