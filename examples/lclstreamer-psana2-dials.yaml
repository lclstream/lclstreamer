source_identifier: exp=mfx100852324,run=51

skip_incomplete_events: True

data_sources:
    timestamp:
        type: Psana2Timestamp

    detector_data:
        type: Psana2DetectorInterface
        psana_name: jungfrau
        psana_fields: raw.calib # Use raw.calib for calibrated data

    photon_wavelength:
        type: Psana2DetectorInterface
        psana_name: "SIOC:SYS0:ML00:AO192"

    spectrometer: # Optional; omitted per-event when missing
        type: Psana2DetectorInterface
        psana_name: feespec
        psana_fields: raw.hproj

    detector_geometry:
        type: Psana2DetectorInterface
        psana_name: "jungfrau"
        psana_fields: [
                "_detid", # Detector ID
                "raw._det_geotxt_default", # Geometry data
                #"raw._pixel_coords", # Pixel coords
            ]
        dtype: str

    beam_data: # Optional
        type: Psana2DetectorInterface
        psana_name: "ebeamh"
        psana_fields: [
                # Photon energy (eV), psana2's undulator-equation conversion of the
                # eBeam L3 energy. Shipped as photon_energy and used as a per-shot
                # wavelength fallback. (Not raw.ebeamL3Energy -- that is the
                # electron-beam energy in MeV, not a photon energy.)
                "raw.ebeamPhotonEnergy", # Photon energy
            ]

    run_info:
        type: Psana2RunInfo

event_source:
    type: Psana2EventSource

processing_pipeline:
    type: BatchProcessingPipeline
    batch_size: 1

data_serializer:
    # The Simplon serializer also carries the optional per-event spectrometer and the
    # real photon_wavelength PV when their sources are configured below.
    type: SimplonBinarySerializer
    data_source_to_serialize: jungfrau.raw.calib
    polarization_fraction: 0.999
    polarization_axis: [1.0, 0.0, 0.0]
    data_collection_rate: "120Hz"
    detector_name: "jungfrau"
    detector_type: "AreaDetector"
    # Flattened data key of the spectrometer source (built as psana_name.psana_fields).
    spectrometer_source: feespec.raw.hproj
    # Optional real photon_wavelength PV (reported in nm; converted to Angstrom).
    photon_wavelength_source: "SIOC:SYS0:ML00:AO192"

data_handlers:
    - type: BinaryDataStreamingDataHandler
      urls:
          - "tcp://127.0.0.1:12321"
      distribute: False
      buffer: 0
      role: client
      library: zmq
      socket_type: push
