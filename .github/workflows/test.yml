name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-data-storage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.54.1
          environments: psana1
          cache: true
      - run: pixi run -e psana1 pytest tests/test_data_storage.py -v
